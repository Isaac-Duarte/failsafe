name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  FAILSAFE_SKIP_WEB_BUILD: "1"

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@1.85.0
        with:
          components: rustfmt, clippy

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Ensure web dist exists for server build
        run: |
          npm ci
          npm run build --workspace failsafe-web-ui

      - name: Cargo fmt
        run: cargo fmt --all -- --check

      - name: Cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Cargo test
        run: cargo test --workspace

      - name: Cargo test (Iroh transport)
        run: cargo test -p failsafe-transport --features iroh -- --ignored

      - name: Bindings drift check
        run: |
          cargo run -p failsafe-bindings
          git diff --exit-code failsafe-ui/src/lib/bindings.ts

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: failsafe-web-ui
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci
        working-directory: ${{ github.workspace }}

      - run: npm run typecheck
      - run: npm run lint
      - run: npm run test
      - run: npm run build
